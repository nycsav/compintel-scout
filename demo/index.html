<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CompIntel Scout Demo</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f6f7f9;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        letter-spacing: 0;
      }

      p,
      li {
        font-size: 1rem;
        line-height: 1.6;
      }

      code {
        background: #e9eef2;
        border-radius: 4px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CompIntel Scout</h1>
      <p>A static placeholder demo for the raw to wiki to schema workflow.</p>
      <ul>
        <li><code>raw/</code> stores agent-written captures.</li>
        <li><code>wiki/</code> stores append-only markdown synthesis.</li>
        <li><code>schema/</code> stores structured outputs and validators.</li>
      </ul>
    </main>
  </body>
</html>
